name: Bump version

on:
  push:
    branches: [main]

jobs:
  bump:
    runs-on: ubuntu-latest
    if: |
      !startsWith(github.event.head_commit.message, 'chore: bump version') &&
      !startsWith(github.event.head_commit.message, 'chore: update prices') &&
      github.event.head_commit.author.name != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Increment patch version
        run: |
          CURRENT=$(grep -oP "(?<=')\d+\.\d+(?=')" version.js)
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          NEW="${MAJOR}.$((MINOR + 1))"
          sed -i "s/'${CURRENT}'/'${NEW}'/" version.js
          sed -i "s/\"version\": \"${CURRENT}\"/\"version\": \"${NEW}\"/" package.json
          echo "NEW_VERSION=$NEW" >> $GITHUB_ENV

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.js package.json
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }}"
          git push
