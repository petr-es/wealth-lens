name: Update prices

on:
  schedule:
    # 14:00 Prague (CEST = UTC+2, summer) / 13:00 (CET = UTC+1, winter)
    - cron: '0 12 * * 1-5'
  workflow_dispatch: # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pytz

      - name: Fetch prices and update history.js
        run: python scripts/update_prices.py
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.js
          git diff --staged --quiet || git commit -m "chore: update prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
