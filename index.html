<!DOCTYPE html>
<html lang="cs" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wealth Lens</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2355e0a0'/%3E%3Cstop offset='100%25' stop-color='%2360d0f0'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='16' y='22' font-family='Space Grotesk, Inter, sans-serif' font-size='18' font-weight='700' text-anchor='middle' fill='%23121a22'%3EW%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="aurora"><span></span></div>

<div class="app" id="app">

  <header class="header">
    <div class="brand-mark">
      <span class="brand-logo">W</span>
      <span class="brand-name">Wealth<em>·</em>Lens</span>
    </div>
    <div class="hero">
      <div class="brand-divider"></div>
      <div class="total">
        <span class="num-anim" id="total-value">–</span>
        <span class="total-ccy" data-i18n="currency">Kč</span>
      </div>
      <div class="delta" id="delta-tag" hidden></div>
      <div class="scope-wrap">
        <button class="scope-dropdown" id="scope-btn" aria-haspopup="true" aria-expanded="false">
          <span class="scope-label" id="scope-label" data-i18n="selectNow">Nyní</span>
          <svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <path d="M2.5 4l2.5 2.5L7.5 4"/>
          </svg>
        </button>
        <div class="cal-popover" id="cal-popover" hidden></div>
      </div>
    </div>
    <div class="header-actions">
      <div class="theme-toggle" id="theme-toggle" title="Theme" role="switch" tabindex="0">
        <svg class="bg-icon bg-moon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 9.5A5.5 5.5 0 0 1 6.5 3a5.5 5.5 0 1 0 6.5 6.5z"/>
        </svg>
        <svg class="bg-icon bg-sun" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="8" cy="8" r="3"/>
          <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3 3l1 1M12 12l1 1M13 3l-1 1M4 12l-1 1"/>
        </svg>
        <div class="theme-toggle-dot">
          <svg class="dot-moon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 9.5A5.5 5.5 0 0 1 6.5 3a5.5 5.5 0 1 0 6.5 6.5z"/>
          </svg>
          <svg class="dot-sun" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="8" cy="8" r="3"/>
            <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3 3l1 1M12 12l1 1M13 3l-1 1M4 12l-1 1"/>
          </svg>
        </div>
      </div>
      <button class="refresh-btn" id="update-btn" onclick="triggerUpdate()" title="Aktualizovat ceny">
        <svg id="update-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2v4h-4"/>
          <path d="M2 14v-4h4"/>
          <path d="M2.5 10a5.5 5.5 0 0 0 9.2 2.2L14 10"/>
          <path d="M13.5 6a5.5 5.5 0 0 0-9.2-2.2L2 6"/>
        </svg>
        <span id="update-label" data-i18n="btnUpdate">Aktualizovat</span>
      </button>
    </div>
  </header>

  <div class="grid-top">

    <div class="card">
      <div class="card-label"><span data-i18n="assetsByAsset">Složení dle aktiva</span></div>
      <div class="card-overlay" id="overlay-assets"></div>
      <div class="alloc" id="content-assets">
        <div class="donut-wrap">
          <svg viewBox="0 0 160 160" width="160" height="160" style="transform: rotate(-90deg);" id="donut-assets"></svg>
          <div class="donut-center">
            <div class="donut-value num-anim" id="center-assets">–</div>
            <div class="donut-unit" data-i18n="currency">Kč</div>
          </div>
        </div>
        <div>
          <div class="alloc-head" id="head-assets">
            <div data-i18n="colAsset">Aktivum</div>
            <div data-i18n="colShare">Podíl</div>
            <div data-i18n="colQty">KS</div>
            <div data-i18n="colValue">Hodnota</div>
          </div>
          <div class="alloc-list" id="list-assets"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-label"><span data-i18n="assetsByBroker">Složení dle brokera</span></div>
      <div class="card-overlay" id="overlay-brokers"></div>
      <div class="alloc" id="content-brokers">
        <div class="donut-wrap">
          <svg viewBox="0 0 160 160" width="160" height="160" style="transform: rotate(-90deg);" id="donut-brokers"></svg>
          <div class="donut-center">
            <div class="donut-value num-anim" id="center-brokers">–</div>
            <div class="donut-unit" data-i18n="currency">Kč</div>
          </div>
        </div>
        <div>
          <div class="alloc-head" id="head-brokers">
            <div data-i18n="colBroker">Broker</div>
            <div data-i18n="colShare">Podíl</div>
            <div data-i18n="colValue">Hodnota</div>
          </div>
          <div class="alloc-list" id="list-brokers"></div>
        </div>
      </div>
    </div>

  </div>

  <div class="grid-bottom">

    <div class="card table-card">
      <div class="card-label"><span data-i18n="assets">Aktiva</span></div>
      <div class="card-overlay" id="overlay-prices"></div>
      <div class="table" id="content-prices">
        <div class="thead">
          <div data-i18n="colAsset">Aktivum</div>
          <div class="num" data-i18n="colPrice">Cena</div>
          <div class="num" data-i18n="colTotalQty">Ks celkem</div>
          <div class="num" data-i18n="col7d">30D</div>
          <div class="num" data-i18n="colValue">Hodnota</div>
        </div>
        <div id="tbl-prices"></div>
      </div>
    </div>

    <div class="card chart-card">
      <div class="chart-header">
        <div class="card-label"><span data-i18n="portfolioHistory">Vývoj portfolia</span></div>
        <div class="chart-controls" id="timeframe-btns"></div>
      </div>
      <div class="card-overlay" id="overlay-history"></div>
      <div id="content-history">
        <div class="chart-wrap" id="chart-wrap">
          <svg id="chart-history"></svg>
          <div id="chart-tooltip" class="chart-tooltip"></div>
        </div>
      </div>
    </div>

  </div>

  <footer class="footer">
    <span class="footer-copy">2026 WealthLens · v<span id="footer-version"></span></span>
    <div class="footer-info" id="footer-info"></div>
    <div class="locale-toggle" id="locale-toggle">
      <button data-locale="cs">CZ</button>
      <button data-locale="en">EN</button>
    </div>
  </footer>

</div>

<script src="version.js"></script>
<script src="lang/lang-cs.js"></script>
<script src="lang/lang-en.js"></script>
<script src="scripts/lang-init.js"></script>
<script src="assets.js"></script>
<script src="history.js"></script>
<script src="scripts/portfolio.js"></script>
<script src="scripts/calendar.js"></script>
<script src="scripts/ui.js"></script>
<script src="scripts/updater.js"></script>
<script>document.getElementById('footer-version').textContent = APP_VERSION;</script>

</body>
</html>
