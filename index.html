<!DOCTYPE html>
<html lang="cs" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wealth Lens</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%2355e0a0'/%3E%3Cstop offset='100%25' stop-color='%2360d0f0'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='16' y='22' font-family='Space Grotesk, Inter, sans-serif' font-size='18' font-weight='700' text-anchor='middle' fill='%23121a22'%3EW%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="page-loader" aria-hidden="true">
  <svg class="loader-w-svg" viewBox="0 0 90 65" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="loader-grad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#55e0a0"/>
        <stop offset="100%" stop-color="#60d0f0"/>
      </linearGradient>
    </defs>
    <path class="loader-w-path" pathLength="200"
      d="M5 8 L23 57 L45 20 L67 57 L85 8"
      stroke="url(#loader-grad)" stroke-width="6"
      stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</div>

<div class="aurora"><span></span></div>

<div id="ptr-bar" aria-hidden="true">
  <svg viewBox="0 0 32 32" fill="none">
    <circle class="ptr-track" cx="16" cy="16" r="12" stroke-width="1.5"/>
    <circle class="ptr-arc" cx="16" cy="16" r="12" stroke-width="2" stroke-linecap="round" stroke-dasharray="0 75.4"/>
  </svg>
</div>

<div class="app" id="app">

  <header class="header">
    <div class="brand-mark">
      <span class="brand-logo">W</span>
      <span class="brand-name"><span class="brand-prefix">W<span class="brand-full">ealth</span><em>·</em></span>Lens</span>
    </div>
    <div class="hero">
      <div class="brand-divider"></div>
      <div class="total">
        <span class="num-anim" id="total-value">–</span>
        <span class="total-ccy" data-i18n="currency">Kč</span>
      </div>
      <div class="delta" id="delta-tag" hidden></div>
    </div>
    <div class="scope-wrap">
      <button class="scope-dropdown" id="scope-btn" aria-haspopup="dialog" aria-expanded="false" aria-label="Select history date">
        <span class="scope-label" id="scope-label" data-i18n="selectNow">Nyní</span>
        <svg aria-hidden="true" width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <path d="M2.5 4l2.5 2.5L7.5 4"/>
        </svg>
      </button>
      <div class="cal-popover" id="cal-popover" role="dialog" aria-label="Calendar" hidden></div>
    </div>
    <div class="header-actions">
      <!-- Desktop trigger for the app settings modal (theme + language) -->
      <button class="settings-btn" type="button" data-settings-open aria-haspopup="dialog" aria-expanded="false">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="8" cy="8" r="2"/>
          <path d="M8 1v2M8 13v2M3 8H1M15 8h-2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4"/>
        </svg>
        <span data-i18n="settings">Nastavení</span>
      </button>
    </div>
  </header>

  <div class="grid-top">

    <div class="card">
      <div class="card-label"><span data-i18n="assetsByAsset">Složení dle aktiva</span></div>
      <div class="card-overlay" id="overlay-assets"></div>
      <div class="alloc" id="content-assets">
        <div class="donut-wrap">
          <svg role="img" aria-label="Asset composition donut chart" viewBox="0 0 160 160" width="160" height="160" style="transform: rotate(-90deg);" id="donut-assets"></svg>
          <div class="donut-center" aria-hidden="true">
            <div class="donut-value num-anim" id="center-assets">–</div>
            <div class="donut-unit" data-i18n="currency">Kč</div>
          </div>
        </div>
        <div>
          <div class="alloc-head" id="head-assets" role="row">
            <div data-i18n="colAsset">Aktivum</div>
            <div data-i18n="colShare">Podíl</div>
            <div data-i18n="colQty">KS</div>
            <div data-i18n="colValue">Hodnota</div>
          </div>
          <div class="alloc-list" id="list-assets"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-label"><span data-i18n="assetsByBroker">Složení dle brokera</span></div>
      <div class="card-overlay" id="overlay-brokers"></div>
      <div class="alloc" id="content-brokers">
        <div class="donut-wrap">
          <svg role="img" aria-label="Broker composition donut chart" viewBox="0 0 160 160" width="160" height="160" style="transform: rotate(-90deg);" id="donut-brokers"></svg>
          <div class="donut-center" aria-hidden="true">
            <div class="donut-value" id="center-brokers">–</div>
            <div class="donut-unit" data-i18n="brokers">brokeři</div>
          </div>
        </div>
        <div>
          <div class="alloc-head" id="head-brokers" role="row">
            <div data-i18n="colBroker">Broker</div>
            <div data-i18n="colShare">Podíl</div>
            <div data-i18n="colValue">Hodnota</div>
          </div>
          <div class="alloc-list" id="list-brokers"></div>
        </div>
      </div>
    </div>

  </div>

  <div class="grid-bottom">

    <div class="card table-card">
      <div class="card-label"><span data-i18n="assets">Aktiva</span></div>
      <div class="card-overlay" id="overlay-prices"></div>
      <div class="table" id="content-prices">
        <div class="thead">
          <div data-i18n="colAsset">Aktivum</div>
          <div class="num" data-i18n="colPrice">Cena</div>
          <div class="num" data-i18n="colTotalQty">Ks celkem</div>
          <div class="num" data-i18n="col7d">30D</div>
          <div class="num" data-i18n="colValue">Hodnota</div>
        </div>
        <div id="tbl-prices"></div>
      </div>
    </div>

    <div class="card chart-card">
      <div class="chart-header">
        <div class="card-label"><span data-i18n="portfolioHistory">Vývoj portfolia</span></div>
        <div class="chart-controls" id="timeframe-btns"></div>
      </div>
      <div class="card-overlay" id="overlay-history"></div>
      <div id="content-history">
        <div class="chart-wrap" id="chart-wrap">
          <svg id="chart-history" role="img" aria-label="Portfolio value history chart"></svg>
          <div id="chart-tooltip" class="chart-tooltip" role="tooltip" aria-hidden="true"></div>
        </div>
      </div>
    </div>

  </div>

  <div id="proj-card" class="card proj-card"></div>

  <footer class="footer">
    <span class="footer-copy">2026 WealthLens · v<span id="footer-version"></span></span>
    <div class="footer-info" id="footer-info"></div>
    <div class="footer-end">
      <!-- Mobile trigger — the header actions are hidden below 768px -->
      <button class="settings-btn" type="button" data-settings-open aria-haspopup="dialog" aria-expanded="false">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="8" cy="8" r="2"/>
          <path d="M8 1v2M8 13v2M3 8H1M15 8h-2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4"/>
        </svg>
        <span data-i18n="settings">Nastavení</span>
      </button>
    </div>
  </footer>

</div>

<!-- App settings modal — reuses the projection modal styling. Kept in static
     markup so the theme / locale controls keep their listeners from ui.js. -->
<div class="proj-modal-backdrop" id="settings-modal-backdrop" style="display: none">
  <div class="proj-modal" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title">
    <div class="proj-modal-header">
      <span class="proj-modal-title" id="settings-modal-title" data-i18n="settings">Nastavení</span>
      <button class="proj-modal-close" id="settings-modal-close" type="button" aria-label="Close">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><path d="M2 2l10 10M12 2L2 12"/></svg>
      </button>
    </div>
    <div class="proj-modal-body">

      <div class="proj-field">
        <div class="proj-toggle-row">
          <span class="proj-field-label" data-i18n="settingsTheme">Vzhled</span>
          <div class="segmented" id="theme-toggle" role="group" aria-label="Theme">
            <button type="button" data-theme-set="light" data-i18n="settingsLight">Světlý</button>
            <button type="button" data-theme-set="dark" data-i18n="settingsDark">Tmavý</button>
          </div>
        </div>
      </div>

      <div class="proj-field">
        <div class="proj-toggle-row">
          <span class="proj-field-label" data-i18n="settingsLanguage">Jazyk</span>
          <div class="segmented" id="locale-toggle" role="group" aria-label="Language">
            <button type="button" data-locale="cs" aria-label="Čeština">CZ</button>
            <button type="button" data-locale="en" aria-label="English">EN</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="version.js"></script>
<script src="lang/lang-cs.js"></script>
<script src="lang/lang-en.js"></script>
<script src="scripts/lang-init.js"></script>
<script src="assets.js"></script>
<script src="history.js"></script>
<script src="scripts/portfolio.js"></script>
<script src="scripts/calendar.js"></script>
<script src="scripts/ui.js"></script>
<script src="scripts/updater.js"></script>
<script src="scripts/projector.js"></script>
<script>document.getElementById('footer-version').textContent = APP_VERSION;</script>

</body>
</html>
