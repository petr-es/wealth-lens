<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="stylesheet" href="themes/theme-blue.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Portfolio<span class="slash">/</span><span class="date" id="header-date">–</span></h1>
  <span class="total">–</span>
  <button id="update-btn" onclick="triggerUpdate()" title="Aktualizovat ceny">
    <svg id="update-icon" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
    </svg>
    <span id="update-label" data-i18n="btnUpdate">Aktualizovat</span>
  </button>
</header>

<div class="grid">

  <div class="card">
    <div class="card-title" data-i18n="assetsByAsset">Složení dle aktiva</div>
    <div class="chart-wrap">
      <svg class="donut" viewBox="0 0 160 160">
        <g id="donut-assets"></g>
        <text class="donut-center" x="80" y="77" id="center-assets">–</text>
        <text class="donut-label"  x="80" y="91" data-i18n="currency">Kč</text>
      </svg>
      <div style="flex:1; min-width:0;">
        <table class="legend">
          <thead>
            <tr>
              <th data-i18n="colAsset">Aktívum</th>
              <th data-i18n="colShare">Podíl</th>
              <th data-i18n="colThousands">tis. Kč</th>
              <th data-i18n="colQty">Ks</th>
            </tr>
          </thead>
          <tbody id="tbl-assets"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title" data-i18n="assetsByBroker">Složení dle brokera</div>
    <div class="chart-wrap">
      <svg class="donut" viewBox="0 0 160 160">
        <g id="donut-brokers"></g>
        <text class="donut-center" x="80" y="77" id="center-brokers">–</text>
        <text class="donut-label"  x="80" y="91" data-i18n="currency">Kč</text>
      </svg>
      <div style="flex:1; min-width:0;">
        <table class="legend">
          <thead>
            <tr>
              <th data-i18n="colBroker">Broker</th>
              <th data-i18n="colShare">Podíl</th>
              <th data-i18n="colThousands">tis. Kč</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbl-brokers"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card card-full">
    <div class="card-title" data-i18n="assets">Assety</div>
    <div class="table-scroll">
      <table class="legend legend--fixed">
        <colgroup>
          <col><col><col><col><col>
        </colgroup>
        <thead>
          <tr>
            <th data-i18n="colAsset">Aktívum</th>
            <th data-i18n="colPrice">Cena</th>
            <th data-i18n="colCzkPerUnit">Kč / ks</th>
            <th data-i18n="colTotalQty">Ks celkem</th>
            <th data-i18n="colValue">Hodnota</th>
          </tr>
        </thead>
        <tbody id="tbl-prices"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="footnote-row">
  <div class="footnote" id="footnote"></div>
  <div class="theme-toggle">
    <select id="lang-select" onchange="setLang(this.value)">
      <option value="cs">CS</option>
      <option value="en">EN</option>
    </select>
    <select id="theme-select" onchange="setTheme(this.value)">
      <option value="blue">Blue</option>
      <option value="grey">Grey</option>
      <option value="light">Light</option>
    </select>
  </div>
</div>

<script src="lang/lang-cs.js"></script>
<script src="lang/lang-en.js"></script>
<script>
  const LANGS = { cs: LANG_CS, en: LANG_EN };
  let LANG = LANGS[localStorage.getItem('lang') || 'cs'];
</script>
<script src="assets.js"></script>
<script src="scripts/prices.sample.js"></script>
<script src="scripts/prices.js"></script>
<script src="scripts/portfolio.js"></script>
<script>
  const THEMES = { blue: 'themes/theme-blue.css', grey: 'themes/theme-grey.css', light: 'themes/theme-light.css' };
  const sheet  = document.querySelector('link[rel="stylesheet"]');
  const selTheme = document.getElementById('theme-select');
  const selLang  = document.getElementById('lang-select');

  function setTheme(val) {
    sheet.setAttribute('href', THEMES[val]);
    localStorage.setItem('theme', val);
  }

  function applyLang() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (LANG[key] !== undefined) el.textContent = LANG[key];
    });
  }

  function setLang(val) {
    LANG = LANGS[val];
    localStorage.setItem('lang', val);
    document.documentElement.lang = val;
    ['tbl-assets', 'tbl-brokers', 'tbl-prices'].forEach(id => {
      document.getElementById(id).innerHTML = '';
    });
    render(PRICES, ASSETS);
    applyLang();
  }

  // restore theme
  const savedTheme = localStorage.getItem('theme') || 'blue';
  selTheme.value = savedTheme;
  if (savedTheme !== 'blue') sheet.setAttribute('href', THEMES[savedTheme]);

  // restore lang
  const savedLang = localStorage.getItem('lang') || 'cs';
  selLang.value = savedLang;
  document.documentElement.lang = savedLang;
  applyLang();
</script>
<script>
  const REPO   = 'petr-es/portfolio-tracker';
  const WORKFLOW = 'update-prices.yml';
  const btn    = document.getElementById('update-btn');
  const label  = document.getElementById('update-label');
  let pollTimer = null;

  function setBtnState(state) {
    btn.className = state ? 'state-' + state : '';
    btn.disabled  = state === 'loading';
    const icon = document.getElementById('update-icon');
    if (state === 'loading') {
      label.textContent = LANG.btnUpdating;
    } else if (state === 'error') {
      icon.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>';
      label.textContent = LANG.btnError;
      setTimeout(() => { setBtnState(null); resetIcon(); }, 4000);
    } else if (state === 'success') {
      icon.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
      label.textContent = LANG.btnDone;
      setTimeout(() => location.reload(), 2000);
    } else {
      resetIcon();
      label.textContent = LANG.btnUpdate;
    }
  }

  function resetIcon() {
    document.getElementById('update-icon').innerHTML =
      '<path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>';
  }

  async function pollLatestRun(triggeredAfter, token) {
    const url = `https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/runs?per_page=1`;
    const res  = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) { setBtnState('error'); return; }
    const { workflow_runs } = await res.json();
    const run = workflow_runs[0];
    if (!run || new Date(run.created_at) < triggeredAfter) {
      pollTimer = setTimeout(() => pollLatestRun(triggeredAfter, token), 3000);
      return;
    }
    if (run.status === 'completed') {
      setBtnState(run.conclusion === 'success' ? 'success' : 'error');
    } else {
      pollTimer = setTimeout(() => pollLatestRun(triggeredAfter, token), 3000);
    }
  }

  function getToken() {
    let token = localStorage.getItem('gh_token');
    if (!token) {
      token = prompt('GitHub Personal Access Token (scope: workflow):\nUloží se pouze do localStorage tohoto prohlížeče.');
      if (!token) return null;
      localStorage.setItem('gh_token', token.trim());
    }
    return token;
  }

  async function triggerUpdate() {
    const token = getToken();
    if (!token) return;
    clearTimeout(pollTimer);
    setBtnState('loading');
    const res = await fetch(
      `https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
      {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ ref: 'main' }),
      }
    );
    if (!res.ok) {
      if (res.status === 401 || res.status === 403) localStorage.removeItem('gh_token');
      setBtnState('error');
      return;
    }
    // Nastav triggeredAt až PO dispatch a odečti 5s buffer proti clock skew
    const triggeredAt = new Date(Date.now() - 5000);
    setTimeout(() => pollLatestRun(triggeredAt, token), 4000);
  }
</script>

</body>
</html>
