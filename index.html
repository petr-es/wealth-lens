<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Portfolio<span class="slash">/</span><span class="date" id="header-date">–</span></h1>
  <span class="total">– tis. Kč</span>
  <div class="meta" id="header-meta"></div>
</header>

<div class="grid">

  <div class="card">
    <div class="card-title">Složení dle aktiva</div>
    <div class="chart-wrap">
      <svg class="donut" viewBox="0 0 160 160">
        <g id="donut-assets"></g>
        <text class="donut-center" x="80" y="77" id="center-assets">–</text>
        <text class="donut-label"  x="80" y="91">tis. Kč</text>
      </svg>
      <div style="flex:1; min-width:0;">
        <table class="legend">
          <thead>
            <tr>
              <th>Aktívum</th>
              <th>Podíl</th>
              <th>tis. Kč</th>
              <th>Ks</th>
            </tr>
          </thead>
          <tbody id="tbl-assets"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Složení dle brokera</div>
    <div class="chart-wrap">
      <svg class="donut" viewBox="0 0 160 160">
        <g id="donut-brokers"></g>
        <text class="donut-center" x="80" y="77" id="center-brokers">–</text>
        <text class="donut-label"  x="80" y="91">tis. Kč</text>
      </svg>
      <div style="flex:1; min-width:0;">
        <table class="legend">
          <thead>
            <tr>
              <th>Broker</th>
              <th>Podíl</th>
              <th>tis. Kč</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbl-brokers"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card card-full">
    <div class="card-title">Assety</div>
    <div class="table-scroll">
      <table class="legend legend--fixed">
        <colgroup>
          <col style="width:18%">
          <col style="width:14%">
          <col style="width:16%">
          <col style="width:16%">
          <col style="width:16%">
          <col style="width:20%">
        </colgroup>
        <thead>
          <tr>
            <th>Aktívum</th>
            <th>Cena</th>
            <th>Kurz</th>
            <th>Kč / ks</th>
            <th>Ks celkem</th>
            <th>Hodnota</th>
          </tr>
        </thead>
        <tbody id="tbl-prices"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="footnote" id="footnote"></div>

<script src="data.js"></script>
<script src="portfolio.js"></script>

</body>
</html>
