<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wealth Lens v2</title>
  <link rel="stylesheet" href="themes/theme-blue.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-top">
    <h1>Wealth Lens</h1>
    <button id="update-btn" onclick="triggerUpdate()" title="Aktualizovat ceny">
      <svg id="update-icon" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
      </svg>
      <span id="update-label" data-i18n="btnUpdate">Aktualizovat</span>
    </button>
  </div>
  <div class="header-bottom">
    <select id="history-select"></select>
    <span id="history-select-sizer" aria-hidden="true"></span>
    <span class="total">–</span>
  </div>
</header>

<div class="grid">

  <div class="card">
    <div class="card-title" data-i18n="assetsByAsset">Složení dle aktiva</div>
    <div class="card-overlay" id="overlay-assets"></div>
    <div class="chart-wrap" id="content-assets">
      <svg class="donut" viewBox="0 0 160 160">
        <g id="donut-assets"></g>
        <text class="donut-center" x="80" y="77" id="center-assets">–</text>
        <text class="donut-label"  x="80" y="91" data-i18n="currency">Kč</text>
      </svg>
      <div style="flex:1; min-width:0;">
        <table class="legend">
          <thead>
            <tr>
              <th data-i18n="colAsset">Aktívum</th>
              <th data-i18n="colShare">Podíl</th>
              <th data-i18n="colThousands">tis. Kč</th>
              <th data-i18n="colQty">Ks</th>
            </tr>
          </thead>
          <tbody id="tbl-assets"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title" data-i18n="assetsByBroker">Složení dle brokera</div>
    <div class="card-overlay" id="overlay-brokers"></div>
    <div class="chart-wrap" id="content-brokers">
      <svg class="donut" viewBox="0 0 160 160">
        <g id="donut-brokers"></g>
        <text class="donut-center" x="80" y="77" id="center-brokers">–</text>
        <text class="donut-label"  x="80" y="91" data-i18n="currency">Kč</text>
      </svg>
      <div style="flex:1; min-width:0;">
        <table class="legend">
          <thead>
            <tr>
              <th data-i18n="colBroker">Broker</th>
              <th data-i18n="colShare">Podíl</th>
              <th data-i18n="colThousands">tis. Kč</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbl-brokers"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card card-full">
    <div class="card-title" data-i18n="assets">Assety</div>
    <div class="card-overlay" id="overlay-prices"></div>
    <div class="table-scroll" id="content-prices">
      <table class="legend legend--fixed">
        <colgroup>
          <col><col><col class="col-pxczk"><col><col>
        </colgroup>
        <thead>
          <tr>
            <th data-i18n="colAsset">Aktívum</th>
            <th data-i18n="colPrice">Cena</th>
            <th class="col-pxczk" data-i18n="colCzkPerUnit">Kč / ks</th>
            <th data-i18n="colTotalQty">Ks celkem</th>
            <th data-i18n="colValue">Hodnota</th>
          </tr>
        </thead>
        <tbody id="tbl-prices"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="footnote-row">
  <div class="footnote" id="footnote"></div>
  <div class="theme-toggle">
    <select id="lang-select" onchange="setLang(this.value)">
      <option value="cs">CS</option>
      <option value="en">EN</option>
    </select>
    <select id="theme-select" onchange="setTheme(this.value)">
      <option value="blue">Blue</option>
      <option value="grey">Grey</option>
      <option value="light">Light</option>
    </select>
  </div>
</div>

<script src="lang/lang-cs.js"></script>
<script src="lang/lang-en.js"></script>
<script src="scripts/lang-init.js"></script>
<script src="assets.js"></script>
<script src="history.js"></script>
<script src="scripts/portfolio.js"></script>
<script src="scripts/ui.js"></script>
<script src="scripts/updater.js"></script>

</body>
</html>
